name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and verify only; do not upload to PyPI"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: publish-3.11
          ignore-nothing-to-cache: true

      - name: Check lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run Ruff lint
        run: uv run --locked ruff check .

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Run tests
        run: uv run --locked pytest -q

      - name: Build distribution
        run: uv build

      - name: Verify publish command
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: uv publish --trusted-publishing always --dry-run dist/*

      - name: Publish to PyPI
        if: ${{ github.event_name == 'release' || !inputs.dry_run }}
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/xiaoya-teacher-mcp-server/ dist/*
