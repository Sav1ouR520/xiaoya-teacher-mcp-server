interface:
  display_name: "小雅教学助手"
  short_description: "XiaoYa courses, papers, grading bundles, attendance"
  default_prompt: "Use $xiaoya-teacher-skill when a teacher needs to operate XiaoYa platform courses, papers, resources, Markdown-rich questions, grading bundles, attendance, or MCP setup."

dependencies:
  tools:
    - type: "mcp"
      value: "xiaoya-teacher-mcp-server"
      description: "MCP server that exposes XiaoYa teaching platform and grading-bundle tools"

policy:
  allow_implicit_invocation: true
